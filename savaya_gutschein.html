<!-- Savaya Bali — Gutschein "Einmaliger Eintritt". Neutral, no birthday message.
     Original clifftop-sunset artwork + styled wordmark (no copyrighted photos/logo files). -->
<meta charset="utf-8">
<title>Savaya · Gutschein</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --night:#0a1622;
    --night2:#12222f;
    --sky-top:#1d2b3f;
    --sky-mid:#5b4a6b;
    --coral:#ff7e6b;
    --amber:#ffb46b;
    --gold:#e9c79b;
    --gold-bright:#f5dcb6;
    --sea:#16323f;
    --sea2:#0d2530;
    --ink:#f3e9da;
    --muted:#c6b69c;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{
    min-height:100%;
    background:
      radial-gradient(1200px 600px at 50% -10%, #1a2433 0%, #0a0f16 60%, #07090d 100%);
    display:flex;align-items:center;justify-content:center;
    padding:32px 18px;
    font-family:"Jost",sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .ticket{
    position:relative;
    width:min(940px,100%);
    aspect-ratio:940/392;
    border-radius:18px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 218px;
    box-shadow:0 40px 80px -30px rgba(0,0,0,.8), 0 0 0 1px rgba(233,199,155,.14);
    background:var(--night);
    animation:rise .9s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(24px) scale(.985)}to{opacity:1;transform:none}}

  /* ---------- main panel ---------- */
  .main{position:relative;overflow:hidden}

  /* sky + sea scene */
  .scene{position:absolute;inset:0}
  .grain{
    position:absolute;inset:0;mix-blend-mode:overlay;opacity:.35;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");
  }
  .vignette{position:absolute;inset:0;background:radial-gradient(120% 100% at 18% 28%, transparent 40%, rgba(5,8,12,.55) 100%);pointer-events:none}

  /* foreground content */
  .content{
    position:relative;height:100%;
    padding:40px 44px 34px;
    display:flex;flex-direction:column;justify-content:space-between;
  }
  .top{display:flex;align-items:flex-start;justify-content:space-between;gap:18px}

  .brand{display:flex;flex-direction:column;gap:9px}
  .wordmark{
    font-family:"Cormorant Garamond",serif;
    font-weight:400;
    font-size:clamp(38px,6.3vw,62px);
    letter-spacing:.42em;
    line-height:.9;
    text-indent:.42em;
    background:linear-gradient(180deg,var(--gold-bright),var(--gold) 55%,#caa473);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 1px 0 rgba(0,0,0,.25));
  }
  .place{
    font-size:clamp(9px,1.25vw,11.5px);
    letter-spacing:.46em;text-indent:.46em;
    color:var(--muted);text-transform:uppercase;font-weight:400;
  }

  .rank{
    text-align:right;flex-shrink:0;
    border:1px solid rgba(233,199,155,.32);
    border-radius:3px;padding:7px 11px;
    color:var(--gold);
  }
  .rank b{display:block;font-family:"Cormorant Garamond",serif;font-size:15px;letter-spacing:.12em}
  .rank span{display:block;font-size:8px;letter-spacing:.34em;color:var(--muted);text-transform:uppercase;margin-top:2px}

  .voucher-block{display:flex;flex-direction:column;gap:6px}
  .kicker{
    font-size:clamp(9px,1.3vw,11.5px);
    letter-spacing:.55em;text-indent:.55em;
    color:var(--coral);text-transform:uppercase;
  }
  .headline{
    font-family:"Cormorant Garamond",serif;
    font-weight:300;
    font-size:clamp(30px,5.4vw,52px);
    line-height:1;color:var(--ink);
  }
  .headline em{font-style:italic;color:var(--gold-bright)}
  .sub{
    font-size:clamp(10px,1.45vw,13px);
    letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-top:3px;
  }

  .fineprint{
    font-size:clamp(8px,1.05vw,10px);
    letter-spacing:.16em;color:rgba(198,182,156,.7);
    text-transform:uppercase;line-height:1.7;
    border-top:1px solid rgba(233,199,155,.16);
    padding-top:12px;max-width:62%;
  }

  /* ---------- stub ---------- */
  .stub{
    position:relative;
    background:linear-gradient(160deg,#0e1d29,#0a1019);
    border-left:2px dashed rgba(233,199,155,.34);
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:30px 18px;text-align:center;
  }
  .stub::before,.stub::after{
    content:"";position:absolute;left:-11px;width:22px;height:22px;border-radius:50%;
    background:radial-gradient(circle at 50% 50%, #07090d 0 60%, transparent 61%);
  }
  .stub::before{top:-11px}
  .stub::after{bottom:-11px}

  .stub-label{font-size:9px;letter-spacing:.44em;text-indent:.44em;color:var(--muted);text-transform:uppercase}
  .cube{width:78px;height:78px;filter:drop-shadow(0 0 18px rgba(255,150,90,.35))}
  .stub-no{font-family:"Cormorant Garamond",serif}
  .stub-no .n{font-size:48px;color:var(--gold-bright);line-height:1;letter-spacing:.06em}
  .stub-no .t{display:block;font-family:"Jost";font-size:8.5px;letter-spacing:.4em;color:var(--muted);text-transform:uppercase;margin-top:6px}

  .shine{
    position:absolute;top:0;left:-60%;width:40%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.07),transparent);
    transform:skewX(-18deg);
    animation:sweep 6.5s ease-in-out 1.1s infinite;
  }
  @keyframes sweep{0%{left:-60%}22%{left:130%}100%{left:130%}}

  @media (max-width:560px){
    .ticket{grid-template-columns:1fr 150px}
    .content{padding:26px 24px 22px}
    .fineprint{max-width:100%}
    .cube{width:56px;height:56px}
  }

  @media print{
    html,body{background:#fff;padding:0}
    .ticket{box-shadow:none;animation:none;width:96%}
    .shine{display:none}
    @page{size:landscape;margin:12mm}
  }
</style>

<div class="ticket">
  <div class="main">
    <!-- scene -->
    <svg class="scene" viewBox="0 0 720 392" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#16243a"/>
          <stop offset="42%" stop-color="#3d3550"/>
          <stop offset="70%" stop-color="#9a5a5e"/>
          <stop offset="88%" stop-color="#ff9b63"/>
          <stop offset="100%" stop-color="#ffc785"/>
        </linearGradient>
        <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ffd28a" stop-opacity=".9"/>
          <stop offset="14%" stop-color="#c87a5f"/>
          <stop offset="55%" stop-color="#1d4150"/>
          <stop offset="100%" stop-color="#0a1f29"/>
        </linearGradient>
        <radialGradient id="sun" cx="50%" cy="50%" r="50%">
          <stop offset="0" stop-color="#fff3d6"/>
          <stop offset="45%" stop-color="#ffd07a"/>
          <stop offset="100%" stop-color="#ff9b5a" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="cube" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#ffe6bf"/>
          <stop offset="100%" stop-color="#ff8c5a"/>
        </linearGradient>
      </defs>

      <rect width="720" height="392" fill="url(#sky)"/>
      <!-- sun glow -->
      <circle cx="430" cy="246" r="150" fill="url(#sun)" opacity=".9"/>
      <circle cx="430" cy="250" r="46" fill="#fff1cf" opacity=".95"/>

      <!-- sea -->
      <rect y="250" width="720" height="142" fill="url(#sea)"/>
      <!-- sun reflection -->
      <g fill="#ffdca0" opacity=".5">
        <rect x="412" y="262" width="36" height="3" rx="1.5"/>
        <rect x="405" y="274" width="50" height="3" rx="1.5"/>
        <rect x="416" y="286" width="28" height="2.5" rx="1.5"/>
        <rect x="400" y="300" width="60" height="2.5" rx="1.5" opacity=".7"/>
      </g>

      <!-- distant haze -->
      <rect y="234" width="720" height="22" fill="#ffb277" opacity=".25"/>

      <!-- clifftop silhouette (foreground, right) -->
      <path d="M720 392 V196 C 660 200 612 214 566 236 C 540 248 520 268 470 276
               C 540 286 612 300 720 300 Z" fill="#0a141c"/>
      <!-- left cliff -->
      <path d="M0 392 V300 C 60 296 120 286 168 270 C 120 262 70 268 0 274 Z" fill="#0a141c" opacity=".92"/>

      <!-- the glowing Cube on the clifftop -->
      <g transform="translate(596 150)" opacity=".95">
        <g stroke="url(#cube)" stroke-width="2" fill="none" stroke-linejoin="round">
          <path d="M0 14 L26 0 L52 14 L26 28 Z" fill="#ff9a5e" fill-opacity=".18"/>
          <path d="M0 14 L0 50 L26 64 L26 28 Z" fill="#ffb46b" fill-opacity=".10"/>
          <path d="M52 14 L52 50 L26 64 L26 28 Z" fill="#ffd9a8" fill-opacity=".06"/>
        </g>
        <circle cx="26" cy="30" r="3" fill="#fff2d6"/>
      </g>
      <!-- tiny palms -->
      <g stroke="#0a141c" stroke-width="3" fill="none" stroke-linecap="round">
        <path d="M150 270 q2 -22 0 -34"/>
        <path d="M150 238 q-14 -6 -22 -2 M150 238 q14 -6 22 -2 M150 238 q-8 -12 -16 -16 M150 238 q8 -12 16 -16"/>
      </g>
    </svg>

    <div class="grain"></div>
    <div class="vignette"></div>

    <div class="content">
      <div class="top">
        <div class="brand">
          <div class="wordmark">SAVAYA</div>
          <div class="place">Beach Club · Uluwatu · Bali</div>
        </div>
        <div class="rank">
          <b>No.1</b><span>Day Club · Asia</span>
        </div>
      </div>

      <div class="voucher-block">
        <div class="kicker">Gutschein</div>
        <div class="headline">Einmaliger <em>Eintritt</em></div>
        <div class="sub">1 × General Admission</div>
      </div>

      <div class="fineprint">
        Gültig für einen Eintritt · einzulösen vor Ort an der Kasse<br>
        Jl. Belimbing Sari, Pecatu — 100 m über dem Indischen Ozean
      </div>
    </div>
  </div>

  <!-- stub -->
  <div class="stub">
    <div class="shine"></div>
    <div class="stub-label">Admit One</div>
    <svg class="cube" viewBox="0 0 80 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#e9c79b" stroke-width="2.4" stroke-linejoin="round">
        <path d="M40 6 L72 24 L40 42 L8 24 Z" stroke="#f5dcb6"/>
        <path d="M8 24 L8 60 L40 78 L40 42 Z"/>
        <path d="M72 24 L72 60 L40 78 L40 42 Z" stroke-opacity=".7"/>
      </g>
      <circle cx="40" cy="44" r="3.4" fill="#f5dcb6"/>
    </svg>
    <div class="stub-no">
      <span class="n">01</span>
      <span class="t">Eintritt</span>
    </div>
  </div>
</div>
